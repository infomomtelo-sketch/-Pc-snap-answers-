<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&C Snap Answers — Photo a Question, Get the Answer</title>
<style>
  :root{
    --ink:#1b2733; --paper:#f7f5f0; --card:#fff; --line:#dcd7cc;
    --correct:#1e7a3c; --correct-bg:#e8f5ec; --accent:#8a6d1f;
    --muted:#6b7683; --ai:#1d5a8a; --ai-bg:#e8f1f8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:var(--paper);color:var(--ink);line-height:1.5;padding-bottom:60px}
  header{background:var(--ink);color:#f2efe8;padding:18px 16px 14px}
  header h1{font-size:1.1rem;font-weight:normal}
  header h1 b{color:#e9c86a}
  header p{font-family:-apple-system,Arial,sans-serif;font-size:.7rem;color:#aeb7c2;margin-top:4px;text-transform:uppercase;letter-spacing:.09em}
  main{max-width:640px;margin:0 auto;padding:16px}
  .snapbtn{
    display:block;width:100%;padding:18px;margin:8px 0 4px;
    font-family:-apple-system,Arial,sans-serif;font-size:1.05rem;font-weight:600;
    background:var(--ink);color:#f2efe8;border:none;border-radius:12px;cursor:pointer;
  }
  .snapbtn:active{opacity:.85}
  .hint{font-family:-apple-system,Arial,sans-serif;font-size:.75rem;color:var(--muted);text-align:center;margin-bottom:14px}
  #preview{width:100%;border-radius:10px;border:1px solid var(--line);display:none;margin:10px 0}
  .status{
    display:none;font-family:-apple-system,Arial,sans-serif;font-size:.9rem;
    color:var(--muted);text-align:center;padding:16px 0;
  }
  .status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);
    animation:pulse 1s infinite alternate;margin-right:8px}
  @keyframes pulse{from{opacity:.3}to{opacity:1}}
  .result{
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;margin:12px 0;
  }
  .result .tag{
    font-family:-apple-system,Arial,sans-serif;font-size:.65rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:20px;display:inline-block;margin-bottom:8px;
  }
  .tag.bank{background:var(--correct-bg);color:var(--correct)}
  .tag.ai{background:var(--ai-bg);color:var(--ai)}
  .result h3{font-size:.95rem;margin-bottom:8px}
  .answer{
    background:var(--correct-bg);color:var(--correct);font-weight:bold;
    padding:10px 12px;border-radius:8px;font-size:.95rem;
  }
  .answer.aians{background:var(--ai-bg);color:var(--ai)}
  .expl{font-size:.85rem;color:#4a5563;margin-top:8px}
  .err{background:#fbeaea;color:#a33;padding:12px;border-radius:8px;font-family:-apple-system,Arial,sans-serif;font-size:.85rem;display:none;margin:10px 0}
</style>
</head>
<body>

<header>
  <h1>P&amp;C <b>Snap Answers</b></h1>
  <p>Photo a practice question · get the answer instantly</p>
</header>

<main>
  <button class="snapbtn" id="snap">📷 &nbsp;Snap a Question</button>
  <div class="hint">Take a photo or choose a screenshot — works with multiple questions in one shot</div>
  <input type="file" id="file" accept="image/*" capture="environment" style="display:none">
  <img id="preview" alt="">
  <div class="status" id="status"><span class="dot"></span><span id="statustext">Reading question…</span></div>
  <div class="err" id="err"></div>
  <div id="results"></div>
</main>

<script>

r might use to investigate an application in order to approve or reject it?", "a": "Department of Industrial Relations"}, {"n": "Q70", "q": "An insurance agent is appointed to transact:", "a": "all are incorrect"}, {"n": "Q71", "q": "Which of the following is NOT a type of authority given to agents?", "a": "Customary authority"}, {"n": "Q72", "q": "A broker can transact all of the following EXCEPT:", "a": "Life, health, and disability insurance"}, {"n": "Q73", "q": "In which of the following marketing distribution systems does the agent represent more than one insurer and more than one company?", "a": "Independent agency"}, {"n": "Q74", "q": "An insurer not authorized to conduct business in California would be:", "a": "either of these"}, {"n": "Q75", "q": "There are no binders issued in:", "a": "Any of the above"}, {"n": "Q76", "q": "Law of agency is the relationship between:", "a": "agent and principal"}, {"n": "Q77", "q": "A person licensed as a broker/agent shall be deemed to be:", "a": "acting as an insurance agent in the transaction of insurance placed with those for whom a notice of appointment has been filed with the Commissioner"}, {"n": "Q78", "q": "Which of the following is a responsibility of the insured in an insurance contract?", "a": "Give true statements and information on the application."}, {"n": "Q79", "q": "The following acts are unlawful and are misdemeanors in California except when performed by a surplus lines broker EXCEPT:", "a": "In any manner, advertising for an admitted insurer in this state."}, {"n": "Q80", "q": "Which marketing system does the insurer not own the expiration list?", "a": "An independent agency"}, {"n": "Q81", "q": "Which of the following would not require a license?", "a": "Insurance Adjuster"}, {"n": "Q82", "q": "The application is the document that:", "a": "states the name of the insured, the premium, and other facts that help the insurer decide whether to accept or reject it."}, {"n": "Q83", "q": "If an agent gives inc equent violation of a cease and desist would result in:", "a": "license suspension"}, {"n": "Q107", "q": "Which of the following describes prior approval as a type of rating law?", "a": "The insurer files policy rate information with the Department of Insurance. After filing, the insurer delivers evidence that the rates proposed are reasonable and fair. Then the insurer waits (30-60 days) for approval."}, {"n": "Q108", "q": "Which of the following is a responsibility of the Commissioner?", "a": "To enforce the laws of insurance."}, {"n": "Q109", "q": "Rates shall remain in effect if they are:", "a": "all of the following"}, {"n": "Q110", "q": "According to the Code a \"Notice of Claim\" is a(n):", "a": "either qualify"}, {"n": "Q111", "q": "CIGA pertains to:", "a": "insurer's insolvency"}, {"n": "Q112", "q": "In order to update, add or change a statute, a bill must be passed by the legislature and then presented to the governor. If the statute is passed, it will go into effect:", "a": "on the next January 1st"}, {"n": "Q113", "q": "When the Commissioner takes over a company that is insolvent, his/her first responsibility is to:", "a": "attempt to restore the company if possible."}, {"n": "Q114", "q": "Unless expressly otherwise provided, any personal notice required by any provision of the insurance code may be given by any of the following EXCEPT:", "a": "a third party"}, {"n": "Q115", "q": "Which of the following is NOT a type of rating law?", "a": "Legal Competition"}, {"n": "Q116", "q": "Which of the following describes file and use as a type of rating law?", "a": "An insurance company must file rates with the commission, but can then use those rates until they hear back from the commission."}, {"n": "Q117", "q": "An Insurer has up to how many days to accept or deny a claim?", "a": "40 days"}, {"n": "Q118", "q": "According to the Code, the word \"person\" means:", "a": "any person, association, organization, partnership, business trust, limited liability company, or corporation."}, {"n": "Q119", "q": "Which of the following statements about insolvency is TRUE?", "a": "An insurer can escape the condition of insolvency by being able to provide for its liabilities and reinsurance of all outstanding risks."}, {"n": "Q120", "q": "How is the Insurance Commissioner put into office?", "a": "Elected by the citizens"}, {"n": "Q121", "q": "Every company in California is required to report its financial condition to the Commissioner every year:", "a": "on or before March 1."}, {"n": "Q122", "q": "Who administers the California Administrative Code of Regulations?", "a": "Commissioner"}, {"n": "Q123", "q": "Which of the following is NOT a purpose of the Unfair Practices Article?", "a": "To determine the punishment for an agent found guilty of unfair practices in insurance."}, {"n": "Q124", "q": "What is the significance of the SEUA (South East Underwriters Association) case of 1944?", "a": "The court decided the federal government should regulate insurance."}, {"n": "Q125", "q": "All of the following are incorrect penalties for violating the Unfair Practices article EXCEPT:", "a": "$10,000 fine for each act in violation; $50,000 fine for willful violation"}, {"n": "Q126", "q": "Which is not a violation of Unfair Practice?", "a": "Age discrimination"}, {"n": "Q127", "q": "All of the following are penalties for unfair discrimination EXCEPT:", "a": "prison"}, {"n": "Q128", "q": "All of the following are efforts the Department of Insurance takes to combat insurance fraud EXCEPT:", "a": "Each company is required to submit a complete record of fraudulent claims made to the business each year."}, {"n": "Q129", "q": "Which of the following is NOT considered an unfair practice?", "a": "Failing to display the license in a clearly visible place for the public to see."}, {"n": "Q130", "q": "If convicted of insurance fraud:", "a": "the fine can be up to $150,000 and up to 5 years in state prison."}, {"n": "Q131", "q": "An example of a self-regulator const fileInput = document.getElementById('file');
const preview = document.getElementById('preview');
const status = document.getElementById('status');
const statustext = document.getElementById('statustext');
const results = document.getElementById('results');
const errBox = document.getElementById('err');

document.getElementById('snap').addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  errBox.style.display = 'none';
  results.innerHTML = '';

  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  preview.src = dataUrl;
  preview.style.display = 'block';

  // downscale large photos so the request stays fast
  const scaled = await downscale(dataUrl, 1600);
  const base64 = scaled.data;
  const mediaType = scaled.type;

  status.style.display = 'block';
  statustext.textContent = 'Reading question…';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text:
`This photo shows one or more California Property & Casualty insurance licensing practice exam questions.

Extract EVERY complete multiple-choice question visible in the image (ignore partially cut-off questions). For each, give your best answer as an insurance licensing expert.

Respond ONLY with a JSON array, no markdown fences, no preamble:
[{"question":"full question text","answer":"the correct answer choice text","explanation":"one short sentence why"}]` }
          ]
        }]
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    status.style.display = 'none';
    render(parsed);
  } catch (e) {
    status.style.display = 'none';
    errBox.textContent = 'Could not read the photo — try a clearer shot with the full question visible.';
    errBox.style.display = 'block';
    console.error(e);
  }
  fileInput.value = '';
});

function downscale(dataUrl, maxW){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const out = canvas.toDataURL('image/jpeg', 0.85);
      res({ data: out.split(',')[1], type: 'image/jpeg' });
    };
    img.src = dataUrl;
  });
}

// --- fuzzy match against the verified bank ---
const STOP = new Set(['the','a','an','of','is','are','to','in','for','and','or','which','following','what','that','be','on','as','with','by']);
function tokens(s){
  return s.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w => w && !STOP.has(w));
}
function matchBank(q){
  const qt = new Set(tokens(q));
  let best = null, bestScore = 0;
  for (const item of BANK){
    const bt = tokens(item.q);
    if (!bt.length) continue;
    let hit = 0;
    for (const w of bt) if (qt.has(w)) hit++;
    const score = hit / Math.max(bt.length, qt.size);
    if (score > bestScore){ bestScore = score; best = item; }
  }
  return bestScore >= 0.55 ? best : null;
}

function esc(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function render(items){
  if (!Array.isArray(items) || !items.length){
    errBox.textContent = 'No complete questions found in that photo.';
    errBox.style.display = 'block';
    return;
  }
  results.innerHTML = items.map(item => {
    const hit = matchBank(item.question || '');
    if (hit){
      return `<div class="result">
        <span class="tag bank">✓ Verified — ${esc(hit.n)} in your quiz bank</span>
        <h3>${esc(hit.q)}</h3>
        <div class="answer">✓ ${esc(hit.a)}</div>
        ${item.explanation ? `<div class="expl">${esc(item.explanation)}</div>` : ''}
      </div>`;
    }
    return `<div class="result">
      <span class="tag ai">AI answer — not in your bank yet</span>
      <h3>${esc(item.question || '')}</h3>
      <div class="answer aians">${esc(item.answer || '')}</div>
      ${item.explanation ? `<div class="expl">${esc(item.explanation)}</div>` : ''}
    </div>`;
  }).join('');
}
